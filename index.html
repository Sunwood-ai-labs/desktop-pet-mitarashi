<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みたらし - Desktop Pet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      overflow: hidden;
      -webkit-app-region: no-drag;
      user-select: none;
      pointer-events: none;
    }

    .container {
      width: 120px;
      height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .mascot {
      width: 100px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
      transition: transform 0.1s ease, opacity 0.3s ease;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform-origin: center center;
      pointer-events: none;
    }

    .mascot.idle {
      opacity: 0.8;
    }

  </style>
</head>
<body>
  <div class="container" id="container">
    <img src="assets/running_cat.webp" alt="Running Cat" class="mascot" id="mascot">
  </div>

  <script>
    const mascot = document.getElementById('mascot');

    const WINDOW_SIZE = { width: 130, height: 110 };
    const EDGE_OVERHANG = 24;
    const CLOCKWISE = 1;
    const COUNTER_CLOCKWISE = -1;

    let mode = 'running';
    let effectiveMode = 'running';
    let randomTimer = null;
    let walkSpeed = 3;
    let walkTimer = null;
    let currentX = 0;
    let currentY = 0;
    let pathOffset = 0;
    let currentEdge = 'bottom';
    let travelDirection = COUNTER_CLOCKWISE;
    let displayBounds = { x: 0, y: 0, width: 0, height: 0 };

    function shouldRun() {
      return mode === 'random' ? effectiveMode === 'running' : mode === 'running';
    }

    async function updateDisplayBounds() {
      displayBounds = await window.electronAPI.getDisplayBounds();
      return displayBounds;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function normalizeOffset(offset, perimeter) {
      if (perimeter <= 0) {
        return 0;
      }

      return ((offset % perimeter) + perimeter) % perimeter;
    }

    function getTrackMetrics() {
      const minX = displayBounds.x - EDGE_OVERHANG;
      const maxX = displayBounds.x + displayBounds.width - WINDOW_SIZE.width + EDGE_OVERHANG;
      const minY = displayBounds.y - EDGE_OVERHANG;
      const maxY = displayBounds.y + displayBounds.height - WINDOW_SIZE.height + EDGE_OVERHANG;
      const spanX = Math.max(maxX - minX, 1);
      const spanY = Math.max(maxY - minY, 1);

      return {
        minX,
        maxX,
        minY,
        maxY,
        spanX,
        spanY,
        perimeter: (spanX * 2) + (spanY * 2)
      };
    }

    function getTrackPositionFromOffset(offset, track = getTrackMetrics()) {
      const normalizedOffset = normalizeOffset(offset, track.perimeter);

      if (normalizedOffset < track.spanX) {
        return {
          edge: 'top',
          x: track.minX + normalizedOffset,
          y: track.minY
        };
      }

      if (normalizedOffset < track.spanX + track.spanY) {
        return {
          edge: 'right',
          x: track.maxX,
          y: track.minY + (normalizedOffset - track.spanX)
        };
      }

      if (normalizedOffset < (track.spanX * 2) + track.spanY) {
        return {
          edge: 'bottom',
          x: track.maxX - (normalizedOffset - track.spanX - track.spanY),
          y: track.maxY
        };
      }

      return {
        edge: 'left',
        x: track.minX,
        y: track.maxY - (normalizedOffset - (track.spanX * 2) - track.spanY)
      };
    }

    function getMovementVector(edge) {
      if (travelDirection === CLOCKWISE) {
        switch (edge) {
          case 'top':
            return { dx: 1, dy: 0 };
          case 'right':
            return { dx: 0, dy: 1 };
          case 'bottom':
            return { dx: -1, dy: 0 };
          default:
            return { dx: 0, dy: -1 };
        }
      }

      switch (edge) {
        case 'top':
          return { dx: -1, dy: 0 };
        case 'right':
          return { dx: 0, dy: -1 };
        case 'bottom':
          return { dx: 1, dy: 0 };
        default:
          return { dx: 0, dy: 1 };
      }
    }

    function applyMascotPose(edge = currentEdge) {
      const movement = getMovementVector(edge);
      let rotation = 0;
      let flip = 1;

      if (edge === 'bottom') {
        rotation = 0;
        flip = movement.dx > 0 ? -1 : 1;
      } else if (edge === 'top') {
        rotation = 180;
        flip = movement.dx < 0 ? -1 : 1;
      } else if (edge === 'left') {
        rotation = 90;
        flip = movement.dy > 0 ? -1 : 1;
      } else {
        rotation = -90;
        flip = movement.dy < 0 ? -1 : 1;
      }

      mascot.style.transform = `rotate(${rotation}deg) scaleX(${flip})`;
    }

    function updateImage() {
      const currentMode = mode === 'random' ? effectiveMode : mode;

      if (currentMode === 'running') {
        mascot.src = 'assets/running_cat.webp';
        mascot.classList.remove('idle');
      } else {
        mascot.src = 'assets/mitarashi.webp';
        mascot.classList.add('idle');
      }

      applyMascotPose();
    }

    function stopAutoWalk() {
      if (walkTimer) {
        clearInterval(walkTimer);
        walkTimer = null;
      }
    }

    function snapToNearestEdge() {
      const track = getTrackMetrics();
      const clampedX = clamp(currentX, track.minX, track.maxX);
      const clampedY = clamp(currentY, track.minY, track.maxY);
      const candidates = [
        {
          edge: 'top',
          x: clampedX,
          y: track.minY,
          offset: clampedX - track.minX
        },
        {
          edge: 'right',
          x: track.maxX,
          y: clampedY,
          offset: track.spanX + (clampedY - track.minY)
        },
        {
          edge: 'bottom',
          x: clampedX,
          y: track.maxY,
          offset: track.spanX + track.spanY + (track.maxX - clampedX)
        },
        {
          edge: 'left',
          x: track.minX,
          y: clampedY,
          offset: (track.spanX * 2) + track.spanY + (track.maxY - clampedY)
        }
      ];

      let nearestCandidate = candidates[0];
      let shortestDistance = Infinity;

      candidates.forEach((candidate) => {
        const distance = Math.hypot(currentX - candidate.x, currentY - candidate.y);
        if (distance < shortestDistance) {
          shortestDistance = distance;
          nearestCandidate = candidate;
        }
      });

      currentX = nearestCandidate.x;
      currentY = nearestCandidate.y;
      currentEdge = nearestCandidate.edge;
      pathOffset = normalizeOffset(nearestCandidate.offset, track.perimeter);
      applyMascotPose();
      window.electronAPI.setWindowPosition(currentX, currentY);
    }

    async function preparePathFromCurrentPosition() {
      await updateDisplayBounds();
      snapToNearestEdge();
    }

    function syncWindowToPath() {
      const track = getTrackMetrics();
      const nextPosition = getTrackPositionFromOffset(pathOffset, track);

      currentEdge = nextPosition.edge;
      currentX = nextPosition.x;
      currentY = nextPosition.y;
      applyMascotPose();
      window.electronAPI.setWindowPosition(currentX, currentY);
    }

    function enterRandomMode() {
      effectiveMode = 'running';
      scheduleNextSwitch();
      updateImage();
      startAutoWalk();
    }

    function exitRandomMode() {
      if (randomTimer) {
        clearTimeout(randomTimer);
        randomTimer = null;
      }

      effectiveMode = mode;
    }

    function scheduleNextSwitch() {
      if (mode !== 'random') {
        return;
      }

      const delay = effectiveMode === 'running'
        ? (Math.random() * 7000 + 3000)
        : (Math.random() * 3000 + 2000);

      randomTimer = setTimeout(() => {
        effectiveMode = effectiveMode === 'running' ? 'idle' : 'running';

        if (effectiveMode === 'running') {
          updateImage();
          startAutoWalk();
        } else {
          stopAutoWalk();
          updateImage();
        }

        scheduleNextSwitch();
      }, delay);
    }

    async function startAutoWalk() {
      if (!shouldRun()) {
        stopAutoWalk();
        return;
      }

      stopAutoWalk();
      await preparePathFromCurrentPosition();
      walkTimer = setInterval(() => {
        if (!shouldRun()) {
          return;
        }

        const track = getTrackMetrics();
        pathOffset = normalizeOffset(pathOffset + (walkSpeed * travelDirection), track.perimeter);
        syncWindowToPath();
      }, 30);
    }

    window.electronAPI.onSetMode(async (newMode) => {
      if (mode === 'random' && newMode !== 'random') {
        exitRandomMode();
      }

      if (newMode === 'random') {
        mode = 'random';
        enterRandomMode();
        return;
      }

      mode = newMode;
      updateImage();

      if (mode === 'running') {
        await startAutoWalk();
      } else {
        stopAutoWalk();
      }
    });

    window.electronAPI.onSetSpeed((newSpeed) => {
      walkSpeed = newSpeed;
    });

    applyMascotPose();

    setTimeout(async () => {
      await updateDisplayBounds();
      const position = await window.electronAPI.getWindowPosition();
      currentX = position.x;
      currentY = position.y;
      snapToNearestEdge();
      updateImage();
      startAutoWalk();
    }, 500);
  </script>
</body>
</html>
