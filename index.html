<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みたらし - Desktop Pet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      overflow: hidden;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    .container {
      width: 120px;
      height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
    }

    .container:active {
      cursor: grabbing;
    }

    .mascot {
      width: 100px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
      transition: transform 0.1s ease, opacity 0.3s ease;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .mascot.flip {
      transform: scaleX(-1);
    }

    .mascot.idle {
      opacity: 0.8;
    }

    .mascot:hover {
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <img src="assets/running_cat.webp" alt="Running Cat" class="mascot flip" id="mascot">
  </div>

  <script>
    const container = document.getElementById('container');
    const mascot = document.getElementById('mascot');

    // モード: 'running' または 'idle'
    let mode = 'running';
    let isDragging = false;
    let lastX, lastY;
    let mouseDownX, mouseDownY; // For click detection
    let hasMoved = false; // Track if mouse moved during click
    let walkDirection = 1; // 1: 右へ, -1: 左へ
    let walkSpeed = 3;
    let walkTimer = null;
    let currentX, currentY;
    let screenWidth, screenHeight;

    // 画面サイズを取得
    function updateScreenSize() {
      window.electronAPI.getScreenSize().then(size => {
        screenWidth = size.width;
        screenHeight = size.height;
      });
    }

    // 初期化
    updateScreenSize();
    window.electronAPI.getWindowPosition().then(pos => {
      currentX = pos.x;
      currentY = pos.y;
    });

    // 画像を切り替え
    function updateImage() {
      if (mode === 'running') {
        mascot.src = 'assets/running_cat.webp';
        mascot.classList.remove('idle');
      } else {
        mascot.src = 'assets/mitarashi.webp';
        mascot.classList.add('idle');
      }
    }

    // 自動走行
    function startAutoWalk() {
      if (mode !== 'running') return;

      walkTimer = setInterval(() => {
        if (isDragging || mode !== 'running') return;

        const bottomY = screenHeight - 120;
        currentX += walkSpeed * walkDirection;

        if (currentX >= screenWidth - 130) {
          currentX = screenWidth - 130;
          walkDirection = -1;
          mascot.classList.remove('flip');
        } else if (currentX <= 10) {
          currentX = 10;
          walkDirection = 1;
          mascot.classList.add('flip');
        }

        currentY = bottomY;
        window.electronAPI.setWindowPosition(currentX, currentY);
      }, 30);
    }

    // ドラッグ開始
    container.addEventListener('mousedown', (e) => {
      isDragging = true;
      lastX = e.screenX;
      lastY = e.screenY;
      mouseDownX = e.screenX;
      mouseDownY = e.screenY;
      hasMoved = false;
      clearInterval(walkTimer);
    });

    // ドラッグ中
    document.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const deltaX = e.screenX - lastX;
        const deltaY = e.screenY - lastY;
        lastX = e.screenX;
        lastY = e.screenY;
        currentX += deltaX;
        currentY += deltaY;
        window.electronAPI.windowDrag(deltaX, deltaY);
        // Check if mouse moved significantly (more than 5 pixels)
        if (Math.abs(e.screenX - mouseDownX) > 5 || Math.abs(e.screenY - mouseDownY) > 5) {
          hasMoved = true;
        }
      }
    });

    // ドラッグ終了
    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        window.electronAPI.getWindowPosition().then(pos => {
          currentX = pos.x;
          currentY = pos.y;
        });
        if (mode === 'running') {
          startAutoWalk();
        }
      }
    });

    // シングルクリックでモード切り替え（ドラッグなしの場合）
    container.addEventListener('click', () => {
      // Only toggle mode if mouse hasn't moved significantly (not a drag)
      if (!hasMoved) {
        mode = mode === 'running' ? 'idle' : 'running';
        updateImage();
        if (mode === 'running') {
          updateScreenSize();
          startAutoWalk();
        } else {
          clearInterval(walkTimer);
        }
      }
    });

    // 右クリックで速度変更
    container.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      walkSpeed = walkSpeed >= 8 ? 2 : walkSpeed + 2;
    });

    // 起動時に自動走行開始
    setTimeout(() => {
      updateScreenSize();
      window.electronAPI.getWindowPosition().then(pos => {
        currentX = pos.x;
        currentY = pos.y;
        startAutoWalk();
      });
    }, 500);
  </script>
</body>
</html>
