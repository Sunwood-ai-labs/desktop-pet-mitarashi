<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みたらし - Desktop Pet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      overflow: hidden;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    .container {
      width: 120px;
      height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
    }

    .container:active {
      cursor: grabbing;
    }

    .mascot {
      width: 100px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
      transition: transform 0.1s ease;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .mascot.flip {
      transform: scaleX(-1);
    }

    .mascot:hover {
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <img src="assets/running_cat.webp" alt="Running Cat" class="mascot flip" id="mascot">
  </div>

  <script>
    const container = document.getElementById('container');
    const mascot = document.getElementById('mascot');

    // 自動走行モード
    let autoWalkMode = true;
    let isDragging = false;
    let lastX, lastY;
    let walkDirection = 1; // 1: 右へ, -1: 左へ
    let walkSpeed = 3;
    let walkTimer = null;
    let currentX, currentY;
    let screenWidth, screenHeight;

    // 画面サイズを取得
    function updateScreenSize() {
      window.electronAPI.getScreenSize().then(size => {
        screenWidth = size.width;
        screenHeight = size.height;
      });
    }

    // 初期化
    updateScreenSize();
    window.electronAPI.getWindowPosition().then(pos => {
      currentX = pos.x;
      currentY = pos.y;
    });

    // 自動走行
    function startAutoWalk() {
      if (!autoWalkMode) return;

      walkTimer = setInterval(() => {
        if (isDragging || !autoWalkMode) return;

        // 画面下端付近を走行
        const bottomY = screenHeight - 120;

        // X座標を更新
        currentX += walkSpeed * walkDirection;

        // 画面端に達したら反転
        if (currentX >= screenWidth - 130) {
          currentX = screenWidth - 130;
          walkDirection = -1;
          mascot.classList.remove('flip');
        } else if (currentX <= 10) {
          currentX = 10;
          walkDirection = 1;
          mascot.classList.add('flip');
        }

        // Y座標を画面下端に固定
        currentY = bottomY;

        // ウィンドウ位置を更新
        window.electronAPI.setWindowPosition(currentX, currentY);
      }, 30);
    }

    // ドラッグ開始
    container.addEventListener('mousedown', (e) => {
      isDragging = true;
      lastX = e.screenX;
      lastY = e.screenY;
      clearInterval(walkTimer);
    });

    // ドラッグ中
    document.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const deltaX = e.screenX - lastX;
        const deltaY = e.screenY - lastY;
        lastX = e.screenX;
        lastY = e.screenY;
        currentX += deltaX;
        currentY += deltaY;
        window.electronAPI.windowDrag(deltaX, deltaY);
      }
    });

    // ドラッグ終了
    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        // ドロップ後の位置を取得
        window.electronAPI.getWindowPosition().then(pos => {
          currentX = pos.x;
          currentY = pos.y;
        });
        // 自動走行を再開
        if (autoWalkMode) {
          startAutoWalk();
        }
      }
    });

    // ダブルクリックで自動走行のオン/オフ
    container.addEventListener('dblclick', () => {
      autoWalkMode = !autoWalkMode;
      if (autoWalkMode) {
        mascot.style.filter = 'drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3))';
        updateScreenSize();
        startAutoWalk();
      } else {
        mascot.style.filter = 'drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3)) sepia(0.3)';
        clearInterval(walkTimer);
      }
    });

    // 右クリックで速度変更
    container.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      walkSpeed = walkSpeed >= 8 ? 2 : walkSpeed + 2;
    });

    // 起動時に自動走行開始
    setTimeout(() => {
      updateScreenSize();
      window.electronAPI.getWindowPosition().then(pos => {
        currentX = pos.x;
        currentY = pos.y;
        startAutoWalk();
      });
    }, 500);
  </script>
</body>
</html>
