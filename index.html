<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みたらし - Desktop Pet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      overflow: hidden;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    .container {
      width: 120px;
      height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
    }

    .container:active {
      cursor: grabbing;
    }

    .mascot {
      width: 100px;
      height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
      transition: transform 0.1s ease, opacity 0.3s ease;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .mascot.flip {
      transform: scaleX(-1);
    }

    .mascot.idle {
      opacity: 0.8;
    }

    .mascot:hover {
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
    }
  </style>
</head>
<body>
  <div class="container" id="container">
    <img src="assets/running_cat.webp" alt="Running Cat" class="mascot flip" id="mascot">
  </div>

  <script>
    const container = document.getElementById('container');
    const mascot = document.getElementById('mascot');

    // モード: 'running', 'idle', または 'random'
    let mode = 'running';
    // ランダムモード時の実際のモード
    let effectiveMode = 'running';
    let randomTimer = null;
    let isDragging = false;
    let lastX, lastY;
    let mouseDownX, mouseDownY; // For click detection
    let hasMoved = false; // Track if mouse moved during click
    let walkDirection = 1; // 1: 右へ, -1: 左へ
    let walkSpeed = 3;
    let walkTimer = null;
    let currentX, currentY;
    let workArea = { x: 0, y: 0, width: 0, height: 0 };

    // 作業領域を取得
    async function updateWorkArea() {
      workArea = await window.electronAPI.getWorkArea();
      return workArea;
    }

    // 初期化
    updateWorkArea();

    // 画像を切り替え
    function updateImage() {
      // ランダムモード時は effectiveMode を使用
      const currentMode = mode === 'random' ? effectiveMode : mode;
      if (currentMode === 'running') {
        mascot.src = 'assets/running_cat.webp';
        mascot.classList.remove('idle');
      } else {
        mascot.src = 'assets/mitarashi.webp';
        mascot.classList.add('idle');
      }
    }

    // ランダムモードに入る
    function enterRandomMode() {
      effectiveMode = 'running';
      scheduleNextSwitch();
      updateImage();
      startAutoWalk();
    }

    // ランダムモードから出る
    function exitRandomMode() {
      if (randomTimer) {
        clearTimeout(randomTimer);
        randomTimer = null;
      }
      // effectiveModeを現在のmodeにリセット
      effectiveMode = mode;
    }

    // 次のモード切り替えをスケジュール
    function scheduleNextSwitch() {
      if (mode !== 'random') return;

      // 現在の effectiveMode に応じた時間を設定
      const delay = effectiveMode === 'running'
        ? (Math.random() * 7000 + 3000)  // 走行: 3〜10秒
        : (Math.random() * 3000 + 2000); // 待機: 2〜5秒

      randomTimer = setTimeout(() => {
        // モードを切り替え
        effectiveMode = effectiveMode === 'running' ? 'idle' : 'running';

        if (effectiveMode === 'running') {
          updateImage();
          startAutoWalk();
        } else {
          clearInterval(walkTimer);
          updateImage();
        }

        // 次の切り替えをスケジュール
        scheduleNextSwitch();
      }, delay);
    }

    // 自動走行
    function startAutoWalk() {
      // ランダムモード時は effectiveMode をチェック
      const shouldRun = mode === 'random' ? effectiveMode === 'running' : mode === 'running';
      if (!shouldRun) {
        // 走行しない場合は既存のタイマーをクリア
        clearInterval(walkTimer);
        walkTimer = null;
        return;
      }

      // 既存のタイマーがあればクリア（重複防止）
      if (walkTimer) {
        clearInterval(walkTimer);
      }

      // 最前面設定
      window.electronAPI.setAlwaysOnTop(true);

      walkTimer = setInterval(() => {
        const shouldRun = mode === 'random' ? effectiveMode === 'running' : mode === 'running';
        if (isDragging || !shouldRun) return;

        // タスクバーのすぐ上（作業領域の下端）
        const bottomY = workArea.y + workArea.height - 110;
        currentX += walkSpeed * walkDirection;

        // 横方向の境界（作業領域内）
        const maxX = workArea.x + workArea.width - 130;
        const minX = workArea.x + 10;

        if (currentX >= maxX) {
          currentX = maxX;
          walkDirection = -1;
          mascot.classList.remove('flip');
        } else if (currentX <= minX) {
          currentX = minX;
          walkDirection = 1;
          mascot.classList.add('flip');
        }

        currentY = bottomY;
        window.electronAPI.setWindowPosition(currentX, currentY);
      }, 30);
    }

    // ドラッグ開始
    container.addEventListener('mousedown', (e) => {
      isDragging = true;
      lastX = e.screenX;
      lastY = e.screenY;
      mouseDownX = e.screenX;
      mouseDownY = e.screenY;
      hasMoved = false;
      clearInterval(walkTimer);
    });

    // ドラッグ中
    document.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const deltaX = e.screenX - lastX;
        const deltaY = e.screenY - lastY;
        lastX = e.screenX;
        lastY = e.screenY;
        currentX += deltaX;
        currentY += deltaY;
        window.electronAPI.windowDrag(deltaX, deltaY);
        // Check if mouse moved significantly (more than 5 pixels)
        if (Math.abs(e.screenX - mouseDownX) > 5 || Math.abs(e.screenY - mouseDownY) > 5) {
          hasMoved = true;
        }
      }
    });

    // ドラッグ終了
    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        window.electronAPI.getWindowPosition().then(pos => {
          currentX = pos.x;
          currentY = pos.y;
        });
        const shouldRun = mode === 'random' ? effectiveMode === 'running' : mode === 'running';
        if (shouldRun) {
          startAutoWalk();
        }
      }
    });

    // シングルクリックでモード切り替え（ドラッグなしの場合）
    container.addEventListener('click', () => {
      // Only toggle mode if mouse hasn't moved significantly (not a drag)
      if (!hasMoved) {
        // ランダムモード時はクリックでは切り替えない
        if (mode === 'random') return;
        mode = mode === 'running' ? 'idle' : 'running';
        updateImage();
        if (mode === 'running') {
          updateWorkArea();
          startAutoWalk();
        } else {
          clearInterval(walkTimer);
        }
      }
    });

    // 右クリックで速度変更
    container.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      walkSpeed = walkSpeed >= 8 ? 2 : walkSpeed + 2;
    });

    // トレイからのモード変更
    window.electronAPI.onSetMode((newMode) => {
      // ランダムモードから出る場合
      if (mode === 'random' && newMode !== 'random') {
        exitRandomMode();
      }
      // ランダムモードに入る場合
      if (newMode === 'random') {
        mode = 'random';
        enterRandomMode();
        return;
      }

      mode = newMode;
      updateImage();
      if (mode === 'running') {
        updateWorkArea();
        startAutoWalk();
      } else {
        clearInterval(walkTimer);
      }
    });

    // トレイからの速度変更
    window.electronAPI.onSetSpeed((newSpeed) => {
      walkSpeed = newSpeed;
    });

    // 起動時に自動走行開始
    setTimeout(async () => {
      await updateWorkArea();
      const pos = await window.electronAPI.getWindowPosition();
      currentX = pos.x;
      currentY = pos.y;
      console.log('workArea:', workArea);  // デバッグ
      startAutoWalk();
    }, 500);
  </script>
</body>
</html>
