<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="1280"
   height="640"
   viewBox="0 0 1280 640"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2F5259;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D98943;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#BF622C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D98471;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-gradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#D98943" opacity="0.1"/>
  <circle cx="1180" cy="540" r="200" fill="#D98471" opacity="0.1"/>

  <!-- Cat body (simplified from mitarashi_minimal.svg) -->
  <g transform="translate(100, 120)" filter="url(#shadow)">
    <!-- Main body -->
    <ellipse cx="200" cy="200" rx="120" ry="90" fill="#F2E2CE"/>
    <!-- Head -->
    <circle cx="200" cy="100" r="70" fill="#F2E2CE"/>
    <!-- Left ear -->
    <polygon points="140,50 160,100 110,80" fill="#F2E2CE"/>
    <!-- Right ear -->
    <polygon points="260,50 240,100 290,80" fill="#F2E2CE"/>
    <!-- Inner left ear -->
    <polygon points="145,60 158,90 120,78" fill="#D98471"/>
    <!-- Inner right ear -->
    <polygon points="255,60 242,90 280,78" fill="#D98471"/>
    <!-- Eyes -->
    <ellipse cx="170" cy="95" rx="12" ry="15" fill="#2F5259"/>
    <ellipse cx="230" cy="95" rx="12" ry="15" fill="#2F5259"/>
    <!-- Eye highlights -->
    <circle cx="175" cy="90" r="4" fill="#FFF"/>
    <circle cx="235" cy="90" r="4" fill="#FFF"/>
    <!-- Nose -->
    <ellipse cx="200" cy="115" rx="8" ry="5" fill="#D98471"/>
    <!-- Mouth -->
    <path d="M 190 125 Q 200 135 210 125" stroke="#D98471" stroke-width="2" fill="none"/>
    <!-- Whiskers left -->
    <line x1="130" y1="110" x2="90" y2="100" stroke="#2F5259" stroke-width="1.5"/>
    <line x1="130" y1="120" x2="90" y2="120" stroke="#2F5259" stroke-width="1.5"/>
    <line x1="130" y1="130" x2="90" y2="140" stroke="#2F5259" stroke-width="1.5"/>
    <!-- Whiskers right -->
    <line x1="270" y1="110" x2="310" y2="100" stroke="#2F5259" stroke-width="1.5"/>
    <line x1="270" y1="120" x2="310" y2="120" stroke="#2F5259" stroke-width="1.5"/>
    <line x1="270" y1="130" x2="310" y2="140" stroke="#2F5259" stroke-width="1.5"/>
    <!-- Front legs -->
    <ellipse cx="150" cy="280" rx="25" ry="35" fill="#F2E2CE"/>
    <ellipse cx="250" cy="280" rx="25" ry="35" fill="#F2E2CE"/>
    <!-- Tail -->
    <path d="M 320 200 Q 380 180 370 120 Q 360 70 340 80" stroke="#F2E2CE" stroke-width="25" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="750" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#F2E2CE" filter="url(#shadow)">
    Desktop Pet
  </text>
  <text x="750" y="290" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#F2E2CE" filter="url(#shadow)">
    Mitarashi
  </text>

  <!-- Version badge -->
  <rect x="750" y="340" width="200" height="70" rx="35" fill="url(#accent-gradient)"/>
  <text x="850" y="392" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#F2E2CE" text-anchor="middle">
    v0.1.0
  </text>

  <!-- Subtitle -->
  <text x="750" y="470" font-family="Arial, sans-serif" font-size="28" fill="#D98943">
    🎉 Initial Release
  </text>

  <!-- Features -->
  <g fill="#F2E2CE" opacity="0.9">
    <text x="750" y="530" font-family="Arial, sans-serif" font-size="18">
      ✦ Auto-Walk Mode
    </text>
    <text x="950" y="530" font-family="Arial, sans-serif" font-size="18">
      ✦ Click to Toggle
    </text>
    <text x="750" y="560" font-family="Arial, sans-serif" font-size="18">
      ✦ Draggable
    </text>
    <text x="950" y="560" font-family="Arial, sans-serif" font-size="18">
      ✦ Speed Control
    </text>
  </g>

  <!-- Paw prints decoration -->
  <g fill="#F2E2CE" opacity="0.2">
    <circle cx="600" cy="400" r="12"/>
    <circle cx="625" cy="385" r="7"/>
    <circle cx="575" cy="385" r="7"/>
    <circle cx="615" cy="365" r="7"/>
    <circle cx="585" cy="365" r="7"/>

    <circle cx="1050" cy="150" r="10"/>
    <circle cx="1070" cy="138" r="6"/>
    <circle cx="1030" cy="138" r="6"/>
    <circle cx="1060" cy="122" r="6"/>
    <circle cx="1040" cy="122" r="6"/>
  </g>
</svg>
