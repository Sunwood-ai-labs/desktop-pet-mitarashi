<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="1280"
   height="640"
   viewBox="0 0 1280 640"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2F5259;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D98943;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#BF622C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D98471;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-gradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#D98943" opacity="0.1"/>
  <circle cx="1180" cy="540" r="200" fill="#D98471" opacity="0.1"/>

  <!-- Embed mitarashi_minimal.svg -->
  <image xlink:href="https://raw.githubusercontent.com/Sunwood-ai-labs/desktop-pet-mitarashi/main/assets/mitarashi_minimal.svg" x="50" y="80" width="500" height="333"/>

  <!-- Title -->
  <text x="700" y="250" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#F2E2CE" filter="url(#shadow)">
    Desktop Pet
  </text>
  <text x="700" y="330" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#F2E2CE" filter="url(#shadow)">
    Mitarashi
  </text>

  <!-- Version badge -->
  <rect x="700" y="380" width="180" height="60" rx="30" fill="url(#accent-gradient)"/>
  <text x="790" y="425" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#F2E2CE" text-anchor="middle">
    v0.1.0
  </text>

  <!-- Subtitle -->
  <text x="700" y="500" font-family="Arial, sans-serif" font-size="24" fill="#D98943">
    🎉 Initial Release
  </text>

  <!-- Features list -->
  <text x="700" y="560" font-family="Arial, sans-serif" font-size="16" fill="#F2E2CE" opacity="0.8">
    Auto-Walk • Click to Toggle • Draggable • Speed Control
  </text>
</svg>
