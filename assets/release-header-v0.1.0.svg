<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="1280"
   height="640"
   viewBox="0 0 1280 640"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2F5259;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a40;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D98943;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#BF622C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D98471;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-gradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#D98943" opacity="0.1"/>
  <circle cx="1180" cy="540" r="200" fill="#D98471" opacity="0.1"/>
  <circle cx="640" cy="320" r="300" fill="#F2E2CE" opacity="0.05"/>

  <!-- Left cat silhouette (idle) -->
  <g transform="translate(150, 180)" filter="url(#shadow)">
    <!-- Simple cat body -->
    <ellipse cx="100" cy="150" rx="80" ry="60" fill="#F2E2CE"/>
    <!-- Head -->
    <circle cx="100" cy="80" r="50" fill="#F2E2CE"/>
    <!-- Ears -->
    <polygon points="60,40 70,80 40,60" fill="#F2E2CE"/>
    <polygon points="140,40 130,80 160,60" fill="#F2E2CE"/>
    <!-- Inner ears -->
    <polygon points="62,48 68,72 48,58" fill="#D98471"/>
    <polygon points="138,48 132,72 152,58" fill="#D98471"/>
    <!-- Eyes -->
    <ellipse cx="80" cy="75" rx="8" ry="10" fill="#2F5259"/>
    <ellipse cx="120" cy="75" rx="8" ry="10" fill="#2F5259"/>
    <!-- Nose -->
    <ellipse cx="100" cy="90" rx="6" ry="4" fill="#D98471"/>
    <!-- Tail -->
    <path d="M 180 150 Q 220 120 200 80 Q 180 50 160 60" stroke="#F2E2CE" stroke-width="15" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Right cat silhouette (running) -->
  <g transform="translate(880, 180)" filter="url(#shadow)">
    <!-- Simple cat body -->
    <ellipse cx="100" cy="150" rx="80" ry="55" fill="#F2E2CE"/>
    <!-- Head -->
    <circle cx="100" cy="80" r="50" fill="#F2E2CE"/>
    <!-- Ears -->
    <polygon points="60,40 70,80 40,60" fill="#F2E2CE"/>
    <polygon points="140,40 130,80 160,60" fill="#F2E2CE"/>
    <!-- Inner ears -->
    <polygon points="62,48 68,72 48,58" fill="#D98943"/>
    <polygon points="138,48 132,72 152,58" fill="#D98943"/>
    <!-- Eyes -->
    <ellipse cx="80" cy="75" rx="8" ry="10" fill="#2F5259"/>
    <ellipse cx="120" cy="75" rx="8" ry="10" fill="#2F5259"/>
    <!-- Nose -->
    <ellipse cx="100" cy="90" rx="6" ry="4" fill="#D98943"/>
    <!-- Running legs -->
    <rect x="50" y="190" width="20" height="40" rx="10" fill="#F2E2CE" transform="rotate(-20 60 210)"/>
    <rect x="130" y="190" width="20" height="40" rx="10" fill="#F2E2CE" transform="rotate(20 140 210)"/>
    <!-- Tail (up) -->
    <path d="M 180 140 Q 230 100 220 50" stroke="#F2E2CE" stroke-width="15" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="640" y="400" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#F2E2CE" text-anchor="middle" filter="url(#shadow)">
    Desktop Pet Mitarashi
  </text>

  <!-- Subtitle -->
  <text x="640" y="460" font-family="Arial, sans-serif" font-size="28" fill="#D98943" text-anchor="middle">
    A cute running cat for your desktop
  </text>

  <!-- Decorative line -->
  <rect x="440" y="480" width="400" height="4" rx="2" fill="url(#accent-gradient)"/>

  <!-- Version badge -->
  <g filter="url(#glow)">
    <rect x="540" y="520" width="200" height="60" rx="30" fill="url(#accent-gradient)"/>
    <text x="640" y="565" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#F2E2CE" text-anchor="middle">
      v0.1.0
    </text>
  </g>

  <!-- Release label -->
  <text x="640" y="620" font-family="Arial, sans-serif" font-size="18" fill="#F2E2CE" opacity="0.7" text-anchor="middle">
    🎉 Initial Release
  </text>

  <!-- Paw prints decoration -->
  <g fill="#F2E2CE" opacity="0.3">
    <circle cx="400" cy="350" r="8"/>
    <circle cx="420" cy="340" r="5"/>
    <circle cx="380" cy="340" r="5"/>
    <circle cx="410" cy="325" r="5"/>
    <circle cx="390" cy="325" r="5"/>

    <circle cx="880" cy="380" r="8"/>
    <circle cx="900" cy="370" r="5"/>
    <circle cx="860" cy="370" r="5"/>
    <circle cx="890" cy="355" r="5"/>
    <circle cx="870" cy="355" r="5"/>
  </g>
</svg>
